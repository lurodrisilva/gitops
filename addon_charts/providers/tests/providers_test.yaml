# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: providers Provider
templates:
  - templates/providers.yaml
tests:
  - it: should render a Provider
    asserts:
      - isKind:
          of: Provider
      - isAPIVersion:
          of: pkg.crossplane.io/v1
      - equal:
          path: metadata.name
          value: provider-redis-azure
      - matchSnapshot: {}
