# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: kubecost PersistentVolumeClaim
templates:
  - templates/01_persistent_volume.yaml
tests:
  - it: should render a PersistentVolumeClaim
    asserts:
      - isKind:
          of: PersistentVolumeClaim
      - isAPIVersion:
          of: v1
      - equal:
          path: metadata.name
          value: kube-cost-pvc
      - matchSnapshot: {}
