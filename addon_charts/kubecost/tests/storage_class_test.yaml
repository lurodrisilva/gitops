# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: kubecost StorageClass
templates:
  - templates/00_storage_class.yaml
tests:
  - it: should render a StorageClass
    asserts:
      - isKind:
          of: StorageClass
      - isAPIVersion:
          of: storage.k8s.io/v1
      - equal:
          path: metadata.name
          value: kube-cost-storage-class
      - matchSnapshot: {}
