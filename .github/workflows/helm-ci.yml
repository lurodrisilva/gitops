name: Helm CI

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

jobs:
  helm-test:
    name: Lint, Test, Package & Push
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest --version "~1" --verify=false

      - name: Download dependencies for addon charts
        run: |
          for chart in addon_charts/*/; do
            if [ -d "$chart" ]; then
              echo "Updating dependencies for $chart"
              helm dependency update "$chart"
            fi
          done

      - name: Lint base_chart
        run: helm lint base_chart/

      - name: Lint addon charts
        run: |
          for chart in addon_charts/*/; do
            if [ -f "$chart/Chart.yaml" ]; then
              echo "Linting $chart"
              helm lint "$chart"
            fi
          done

      - name: Template base_chart
        run: helm template test base_chart/

      - name: Test base_chart with helm-unittest
        run: helm unittest base_chart/

      - name: Test addon charts with helm-unittest
        run: |
          for chart in addon_charts/*/; do
            if [ -d "$chart/tests" ]; then
              echo "Testing $chart"
              helm unittest "$chart"
            fi
          done

      - name: Package chart
        run: |
          make package

      - name: Login to GHCR
        run: |
          echo "${GITHUB_TOKEN}" | helm registry login ghcr.io \
            --username "${GITHUB_ACTOR}" \
            --password-stdin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push Helm chart
        run: |
          helm push control-plane-addons-*.tgz oci://ghcr.io/${{ github.repository_owner }}/helm-charts          
