# yaml-language-server: $schema=https://raw.githubusercontent.com/helm-unittest/helm-unittest/main/schema/helm-testsuite.json
suite: cert-manager ArgoCD Application
templates:
  - templates/09-cert-manager.yaml
tests:
  - it: should render no documents when disabled
    set:
      cert_manager.enabled: false
    asserts:
      - hasDocuments:
          count: 0
  - it: should render one Application when enabled
    set:
      cert_manager.enabled: true
    asserts:
      - hasDocuments:
          count: 1
      - isKind:
          of: Application
      - isAPIVersion:
          of: argoproj.io/v1alpha1
      - equal:
          path: metadata.name
          value: cert-manager
      - equal:
          path: metadata.namespace
          value: control-plane-system
      - equal:
          path: metadata.annotations["argocd.argoproj.io/sync-wave"]
          value: "9"
      - equal:
          path: spec.source.path
          value: addon_charts/cert-manager
      - equal:
          path: spec.destination.namespace
          value: control-plane-system
      - contains:
          path: metadata.finalizers
          content: resources-finalizer.argocd.argoproj.io
      - equal:
          path: spec.syncPolicy.automated.prune
          value: true
      - equal:
          path: spec.syncPolicy.automated.selfHeal
          value: true
      - contains:
          path: spec.syncPolicy.syncOptions
          content: CreateNamespace=true
      - contains:
          path: spec.syncPolicy.syncOptions
          content: PruneLast=true
      - equal:
          path: spec.syncPolicy.retry.limit
          value: 5
      - equal:
          path: spec.ignoreDifferences[0].group
          value: admissionregistration.k8s.io
      - equal:
          path: spec.ignoreDifferences[0].kind
          value: ValidatingWebhookConfiguration
      - equal:
          path: spec.ignoreDifferences[0].name
          value: cert-manager-webhook
      - matchSnapshot:
          path: spec.syncPolicy
